# Server Configuration
server.port=8001

# MongoDB Configuration
spring.data.mongodb.uri=${MONGO_URL:mongodb://localhost:27017}
spring.data.mongodb.database=${DB_NAME:license_management}

# JWT Configuration
jwt.secret=${JWT_SECRET:LicenseManagementSystemSecretKey2024VeryLongAndSecureKeyForJWTSigning}
jwt.expiration=86400000

# CORS Configuration
cors.allowed-origins=${CORS_ORIGINS:*}

# License Configuration
license.expiry-warning-days=7
license.default-grace-period-days=${GRACE_PERIOD_DAYS:7}
license.signing-secret=${LICENSE_SIGNING_SECRET:LicenseSigningSecretKey2024ForOfflineValidation}

# Email Configuration (SMTP)
spring.mail.host=${SMTP_HOST:smtp.gmail.com}
spring.mail.port=${SMTP_PORT:587}
spring.mail.username=${SMTP_USERNAME:}
spring.mail.password=${SMTP_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
email.from=${EMAIL_FROM:noreply@licensevault.com}
email.enabled=${EMAIL_ENABLED:false}

# Logging
logging.level.com.licensemanager=DEBUG
logging.level.org.springframework.security=INFO
