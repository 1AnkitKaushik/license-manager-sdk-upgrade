apiVersion: apps/v1
kind: Deployment
metadata:
  name: licensevault-backend
  namespace: licensevault
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend-server
  template:
    metadata:
      labels:
        app: backend-server
    spec:
      containers:
        - name: backend-container
          image: licensevault-backend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8001
---
apiVersion: v1
kind: Service
metadata:
  name: backend-service
  namespace: licensevault
spec:
  type: NodePort
  selector:
    app: backend-server
  ports:
    - port: 8001
      targetPort: 8001
      nodePort: 30081